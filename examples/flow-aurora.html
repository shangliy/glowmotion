<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI release — glowmotion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace; background: #030712;
         min-height: 100vh; padding: 2rem; color: #e6edf6; }
  .container { max-width: 960px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 0.4rem; }
  .pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: #2dd4bf; }
  h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .capsule { display: inline-block; background: rgba(45,212,191,0.14); color: #2dd4bf;
    border: 1px solid #2dd4bf; border-radius: 999px; padding: 0 14px;
    margin-left: 10px; font-size: 1.05rem; line-height: 1.75; }
  .sig { margin-left: auto; color: #e6edf6; font-size: 0.85rem; font-weight: 600;
    text-shadow: -1px 1px 0 #c084fc59, 1px -1px 0 #2dd4bf59; }
  .subtitle { color: #5f7290; font-size: 0.8rem; margin-bottom: 1.5rem; }
  .diagram-card { border: 1px solid #1b2740; border-radius: 12px; position: relative;
    background: repeating-linear-gradient(0deg, #0d1526 0 0.5px, transparent 0.5px 40px),
      repeating-linear-gradient(90deg, #0d1526 0 0.5px, transparent 0.5px 40px), #050b18;
    padding: 1.25rem 1rem; }
  .pause-btn { position: absolute; top: 12px; right: 12px; z-index: 2; background: transparent;
    border: 1px solid #1b2740; color: #5f7290; border-radius: 6px; padding: 4px 10px;
    font: inherit; font-size: 11px; cursor: pointer; }
  .pause-btn:hover { color: #e6edf6; border-color: #2c3d5f; }
  .footer { color: #43536e; font-size: 0.7rem; margin-top: 1rem; }
  .flow { stroke-dasharray: 5 5; }
  .flow-async { stroke-dasharray: 2 4; }
  .flow-auth { stroke-dasharray: 4 4; }
  .halo { opacity: 0; }
  @media (prefers-reduced-motion: no-preference) {
    .flow { animation: dashmove 0.75s linear infinite; }
    .flow-async { animation: dashasync 0.9s linear infinite; }
    .flow-auth { animation: dashauth 1.2s linear infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    .halo { animation: halo 4.8s ease-in-out infinite; }
  }
  @keyframes dashmove { to { stroke-dashoffset: -10; } }
  @keyframes dashasync { to { stroke-dashoffset: -12; } }
  @keyframes dashauth { to { stroke-dashoffset: -8; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes halo { 0%, 20%, 100% { opacity: 0; } 7% { opacity: 0.8; } 13% { opacity: 0.3; } }
  body.paused .flow, body.paused .flow-async, body.paused .flow-auth,
  body.paused .pulse-dot, body.paused .halo { animation-play-state: paused; }
</style>
</head>
<body>

imateMotion dur="0.6s" begin="j0_7.begin+0.18s" fill="freeze" path="M109 774 V826"/></circle></g><g font-family="'JetBrains Mono', ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace" text-anchor="middle"><rect x="54" y="34" width="110" height="40" rx="20" fill="rgba(45,212,191,0.08)" stroke="#2dd4bf" stroke-width="1.5"/><rect x="54" y="34" width="110" height="40" rx="20" fill="none" stroke="#2dd4bf" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:0.0s"/><text x="109" y="58" fill="#e6edf6" font-size="13" font-weight="600">push</text><rect x="36.5" y="130" width="145" height="44" rx="8" fill="rgba(56,189,248,0.05)" stroke="#38bdf8"/><rect x="36.5" y="130" width="145" height="44" rx="8" fill="none" stroke="#38bdf8" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:0.6s"/><text x="109" y="156" fill="#e6edf6" font-size="13" font-weight="500">Lint + typecheck</text><rect x="54" y="230" width="110" height="44" rx="8" fill="rgba(56,189,248,0.05)" stroke="#38bdf8"/><rect x="54" y="230" width="110" height="44" rx="8" fill="none" stroke="#38bdf8" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:1.2s"/><text x="109" y="256" fill="#e6edf6" font-size="13" font-weight="500">Unit tests</text><rect x="54" y="330" width="110" height="44" rx="8" fill="rgba(56,189,248,0.05)" stroke="#38bdf8" stroke-dasharray="4 3"/><rect x="54" y="330" width="110" height="44" rx="8" fill="none" stroke="#38bdf8" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:1.8s"/><text x="109" y="356" fill="#e6edf6" font-size="13" font-weight="500">All green?</text><rect x="46" y="430" width="126" height="44" rx="8" fill="rgba(56,189,248,0.05)" stroke="#38bdf8"/><rect x="46" y="430" width="126" height="44" rx="8" fill="none" stroke="#38bdf8" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:2.4s"/><text x="109" y="456" fill="#e6edf6" font-size="13" font-weight="500">Build artifact</text><rect x="34" y="530" width="150" height="44" rx="8" fill="rgba(56,189,248,0.05)" stroke="#38bdf8"/><rect x="34" y="530" width="150" height="44" rx="8" fill="none" stroke="#38bdf8" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:3.0s"/><text x="109" y="556" fill="#e6edf6" font-size="13" font-weight="500">Deploy to staging</text><rect x="52" y="630" width="114" height="44" rx="8" fill="rgba(56,189,248,0.05)" stroke="#38bdf8"/><rect x="52" y="630" width="114" height="44" rx="8" fill="none" stroke="#38bdf8" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:3.6s"/><text x="109" y="656" fill="#e6edf6" font-size="13" font-weight="500">Smoke suite</text><rect x="37.5" y="730" width="143" height="44" rx="8" fill="rgba(56,189,248,0.05)" stroke="#38bdf8"/><rect x="37.5" y="730" width="143" height="44" rx="8" fill="none" stroke="#38bdf8" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:4.2s"/><text x="109" y="756" fill="#e6edf6" font-size="13" font-weight="500">Promote to prod</text><rect x="54" y="830" width="110" height="40" rx="20" fill="rgba(45,212,191,0.08)" stroke="#2dd4bf" stroke-width="1.5"/><rect x="54" y="830" width="110" height="40" rx="20" fill="none" stroke="#2dd4bf" stroke-width="2" class="halo" filter="url(#glow)" style="animation-delay:4.8s"/><text x="109" y="854" fill="#e6edf6" font-size="13" font-weight="600">released</text></g><use href="#sparkle" x="10" y="8" width="12" height="12" color="#2dd4bf" opacity="0.35"/><use href="#sparkle" x="296" y="12" width="12" height="12" color="#c084fc" opacity="0.35"/><use href="#sparkle" x="8" y="890" width="12" height="12" color="#f472b6" opacity="0.35"/><use href="#sparkle" x="292" y="886" width="12" height="12" color="#38bdf8" opacity="0.35"/><rect x="0" y="0" width="320" height="914" fill="url(#vig)"/></svg>

  <p class="footer">glowmotion · flow mode · aurora theme</p>
</div>

<script>
(function () {
  var svg = document.getElementById('flowsvg');
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('.dot, .trail').forEach(function (d) { d.remove(); });
    var b = document.getElementById('pauseBtn'); if (b) b.remove(); return;
  }
  var btn = document.getElementById('pauseBtn'); var paused = false;
  btn.addEventListener('click', function () {
    paused = !paused; document.body.classList.toggle('paused', paused);
    paused ? svg.pauseAnimations() : svg.unpauseAnimations();
    btn.textContent = paused ? '▶ play' : '⏸ pause';
    btn.setAttribute('aria-pressed', String(paused));
  });
})();
</script>
